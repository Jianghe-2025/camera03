# MediaMTX v1.x 配置 - PTZ RTSP + LL-HLS 流输出

logLevel: warn
logDestinations: [stdout]

# RTSP 服务（ffmpeg 推流端）
rtsp: true
rtspAddress: :8554

# HLS 服务（浏览器 hls.js 播放）
hls: true
hlsAddress: :8888
hlsVariant: lowLatency
hlsSegmentDuration: 1s
hlsPartDuration: 200ms
hlsAllowOrigin: '*'

# 关闭其他协议
rtmp: false
webrtc: false
srt: false

# 明确允许推流路径（不设认证）
paths:
  ptz_cam:
    source: publisher
