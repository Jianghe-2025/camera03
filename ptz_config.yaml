# PTZ 仿真 ONVIF 服务配置
# 与 ptz_stream.py 放在同一目录即可整体复制到其他工程
# ---------------------------------------------------------------------------

# ── 服务端口配置 ──────────────────────────────────────────────────────────
# 启动器（轻量 Web UI，始终运行）监听端口；浏览器访问此端口
launcher_port: 8080
# Isaac Sim 内部 HTTP 端口（由启动器按需拉起，不占 GPU 时不运行）
ctrl_port: 8081
# Isaac Sim (python.sh) 路径，供启动器调用
python_sh: /home/uniubi/isaacsim/python.sh

# 要加载的 USD 场景文件（相对路径或绝对路径）
scene_path: /home/uniubi/Desktop/camera03-main/qiping_donghuo.usdz

# 场景内为美术内置 Camera（非 CameraRig 三层）；camera_test.usd 与 qiping 包均为该路径
camera_prim: /World/Camera_Lighttests

# 除 camera_prim 外停用其它 Camera（推流与 PTZ 只认这一台）
deactivate_other_cameras: true

# 输出 RTSP 流地址
rtsp_url: rtsp://localhost:8554/ptz_cam

# 视频分辨率 [宽, 高]
# 性能优先档：960x540；质量档：1280x720；高质量：1920x1080
resolution: [960, 540]

# 输出帧率（fps）
# 性能优先先用 10，稳定后可逐步回升到 15/25
fps: 10

# ffmpeg 视频码率
bitrate: "1M"

# 仿真步进频率（Hz），通常保持默认值
# skip_frames = round(sim_hz / fps)，仿真比流帧率快时自动跳帧
sim_hz: 60

# RTSP 推流开关（true=通过 ffmpeg+MediaMTX 输出 RTSP；false=不推流）
# 视频预览统一使用 VLC 拉取 rtsp://<host>:8554/ptz_cam，Web UI 不再内嵌视频
# 关闭后无需 ffmpeg 和 MediaMTX，启动更快
rtsp_enabled: true

# 已废弃（MJPEG/WS-FLV 推流链已移除，仅保留 RTSP + ONVIF/PTZ）
# 保留此字段避免旧配置解析报错，值不再生效
preview_enabled: false

# 渲染器模式（仅 ptz_stream.py 使用）
# RaytracedLighting：光线追踪，画质最好，GPU 压力最大
# 若 RTSP 仍不流畅，可切换到 PathTracing 并降低 spp，或联系 NVIDIA 支持
renderer: "RaytracedLighting"

# OSD 时间戳叠加（叠加在 ffmpeg 编码阶段，零 Python 开销）
# enabled: 是否显示时间戳
# fmt:     时间格式，支持 strftime 格式字符串
# x/y:     文字位置（像素，支持表达式：W=视频宽，H=视频高）
# size:    字体大小（像素）
# font:    字体文件路径（需系统存在该字体）
osd_time:
  enabled: true
  fmt: "%Y-%m-%d %H:%M:%S"
  x: 10
  y: 10
  size: 28
  font: "/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf"

# 1× 广角基准焦距（mm），与场景中 Camera 的 focalLength 一致
# 32× 变焦时焦距 = focal_length_1x * 32
focal_length_1x: 18.14756

# 相机漫游：平移 camera_prim（扁平相机）或 CameraRig（三层 PTZ）；仅改 USD，不停止推流
roam:
  step: 0.5
  # bounds:   # 可选，按世界轴限制 [min, max]
  #   x: [-2000, 2000]
  #   y: [-2000, 2000]
  #   z: [-500, 500]

# 成像：AE 开时推流只用 stream_rgb_gain；AE 关时推流再乘 (ISO/iso_stream_reference)。carb 项尽力写入，以推流增益为准。
imaging:
  stream_rgb_gain: 1.0
  iso_stream_reference: 100.0
  ae_enabled: false
  iso: 100
  exposure_time: 0.05

# MediaMTX RTSP 服务器配置
mediamtx:
  # mediamtx 二进制路径（相对或绝对）；不存在时脚本自动下载
  path: ./mediamtx
  # RTSP 监听端口
  port: 8554
  # 自动从 GitHub 下载 mediamtx（无法访问外网时设为 false，需提前手动放置二进制）
  auto_download: true
  # GitHub Release 版本标签
  version: "v1.17.0"

# PTZ 预置位（固定 1~5 槽位，launcher 保存后会回写本文件）
presets:
  "1":
    name: 默认位
    pan: -56.0
    tilt: 9.0
    zoom: 1.0
  "2":
    name: 水平正视
    pan: 0.0
    tilt: 0.0
    zoom: 1.0
  "3":
    name: 左90°
    pan: -90.0
    tilt: -45.0
    zoom: 1.0
  "4":
    name: 右90°
    pan: 90.0
    tilt: -45.0
    zoom: 1.0
  "5":
    name: 俯视
    pan: 0.0
    tilt: 30.0
    zoom: 1.0
