# PTZ 虚拟相机推流配置（ONVIF + RTSP 版）
# 与 ptz_rtsp_stream.py / ptz_launcher.py 放在同一目录即可整体复制到其他工程
# ---------------------------------------------------------------------------

# ── 服务端口配置 ──────────────────────────────────────────────────────────
# 启动器（ONVIF + 管理接口，始终运行）监听端口
launcher_port: 8080
# Isaac Sim 内部 HTTP 端口（由启动器按需拉起，不占 GPU 时不运行）
ctrl_port: 8081
# Isaac Sim 内嵌 WebSocket 视频流端口（纯 stdlib 实现，无需额外依赖）
ws_port: 8765
# Isaac Sim (python.sh) 路径，供启动器调用
python_sh: /home/uniubi/projects/issac/.isaac_sim_unzip/python.sh

# 要加载的 USD 场景文件（相对路径或绝对路径）
scene_path: ./V4.0.usd

# 场景中 PTZ 相机 Prim 的完整路径
# V4.0.usd：裸 Camera + CameraRig 控制层级（Z-up，米）
# V3.0.usd：camera_prim: /World/PTZ/Pan/Tilt/Camera
camera_prim: /World/CameraRig/CamTilt/Camera

# 输出 RTSP 流地址
rtsp_url: rtsp://localhost:8554/ptz_cam

# 视频分辨率 [宽, 高]
resolution: [1920, 1080]

# 输出帧率（fps）
fps: 15

# ffmpeg 视频码率
bitrate: "4M"

# 仿真步进频率（Hz）
sim_hz: 60

# RTSP 推流开关（true=输出 RTSP 供 VLC/NVR 接入；false=仅提供 snapshot 快照）
rtsp_enabled: true

# 1× 广角基准焦距（mm），与场景中 Camera 的 focalLength 一致
# 32× 变焦时：focalLength = focal_length_1x * 32
focal_length_1x: 18.14756

# MediaMTX RTSP 服务器配置
mediamtx:
  # mediamtx 二进制路径（相对或绝对）；不存在时脚本自动下载
  path: ./mediamtx
  # RTSP 监听端口
  port: 8554
  # 自动从 GitHub 下载 mediamtx（无法访问外网时设为 false，需提前手动放置二进制）
  auto_download: true
  # GitHub Release 版本标签
  version: "v1.17.0"
