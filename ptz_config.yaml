# PTZ 仿真 ONVIF 服务配置
# 与 ptz_stream.py 放在同一目录即可整体复制到其他工程
# ---------------------------------------------------------------------------

# ── 服务端口配置 ──────────────────────────────────────────────────────────
# 启动器（轻量 Web UI，始终运行）监听端口；浏览器访问此端口
launcher_port: 6670
# Isaac Sim 内部 HTTP 端口（由启动器按需拉起，不占 GPU 时不运行）
ctrl_port: 6671
# Isaac Sim 5.1.0 独立包（官方 Quick Install）解压目录下的 python.sh
python_sh: /home/uniubi/isaacsim/python.sh

# 场景：V4.0.usd 已通过 payload 引用同目录下 DiaoLan_ChangJing_2026.03.18.usdz（工地场景），并包含 PTZ 用的 CameraRig。
# 若只把 scene_path 改成 .usdz，将缺少 CameraRig，推流相机路径需另行 setup；一般保持 V4.0.usd 即可。
scene_path: ./V4.0.usd

# 场景中 PTZ 相机 Prim 的完整路径
# V4.0.usd：裸 Camera + CameraRig 控制层级（Z-up，米）
# V3.0.usd：camera_prim: /World/PTZ/Pan/Tilt/Camera
# V2.0.usd：camera_prim: /World/Xform/Pan/Tilt/Camera
camera_prim: /World/CameraRig/CamTilt/Camera

# 输出 RTSP 流地址（与 mediamtx.port、mediamtx.yml 中 rtspAddress 一致）
rtsp_url: rtsp://localhost:6674/ptz_cam

# 视频分辨率 [宽, 高]
# 性能优先档：960x540；质量档：1280x720；高质量：1920x1080
resolution: [960, 540]

# 输出帧率（fps）
# 性能优先先用 10，稳定后可逐步回升到 15/25
fps: 10

# ffmpeg 视频码率
bitrate: "1M"

# 仿真步进频率（Hz），通常保持默认值
# skip_frames = round(sim_hz / fps)，仿真比流帧率快时自动跳帧
sim_hz: 60

# RTSP 推流开关（true=同时输出 RTSP 供 VLC/NVR 使用；false=仅 MJPEG 浏览器预览）
# 关闭后无需 ffmpeg 和 MediaMTX，启动更快，延迟更低
rtsp_enabled: true

# 预览链开关
# false = 关闭 MJPEG 编码、ws-flv 广播、ws-fetcher 轮询，仅保留 RTSP + ONVIF/PTZ
# true  = 同时开启网页预览（ws-flv / MJPEG）和 RTSP，资源占用更高
preview_enabled: true

# MJPEG 画质（50~95，越高越清晰但带宽越大）
# 本地网络建议 75~85；局域网可提高到 90
mjpeg_quality: 80

# 渲染器模式（仅 ptz_stream.py 使用）
# RaytracedLighting：光线追踪，画质最好，GPU 压力最大
# 若 RTSP 仍不流畅，可切换到 PathTracing 并降低 spp，或联系 NVIDIA 支持
renderer: "RaytracedLighting"

# OSD 时间戳叠加（叠加在 ffmpeg 编码阶段，零 Python 开销）
# enabled: 是否显示时间戳
# fmt:     时间格式，支持 strftime 格式字符串
# x/y:     文字位置（像素，支持表达式：W=视频宽，H=视频高）
# size:    字体大小（像素）
# font:    字体文件路径（需系统存在该字体）
osd_time:
  enabled: true
  fmt: "%Y-%m-%d %H:%M:%S"
  x: 10
  y: 10
  size: 28
  font: "/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf"

# 1× 广角基准焦距（mm），与场景中 Camera 的 focalLength 一致
# 32× 变焦时焦距 = focal_length_1x * 32
focal_length_1x: 18.14756

# MediaMTX RTSP 服务器配置
mediamtx:
  # mediamtx 二进制路径（相对或绝对）；不存在时脚本自动下载
  path: ./mediamtx
  # RTSP 监听端口
  port: 6674
  # 自动从 GitHub 下载 mediamtx（无法访问外网时设为 false，需提前手动放置二进制）
  auto_download: true
  # GitHub Release 版本标签
  version: "v1.17.0"
